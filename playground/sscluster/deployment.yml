kind: Deployment
apiVersion: apps/v1

metadata:
  name: nginx-deployment
  namespace: nginx-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template: 
    metadata: 
      name: nginx-deployment
      labels: 
        app: nginx
    spec:
      containers:
        - name: nginx-container
          image: nginx:latest
          ports:
            - containerPort: 80

    
  